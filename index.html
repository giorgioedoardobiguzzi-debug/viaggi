<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Allows embedding in Notion and other iframe hosts -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
<title>I miei viaggi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ocean:#aacbde;--land:#f2efe9;--land-h:#e4dfc8;--land-b:#d8d2c2;
  --vis:#34c759;--vis-dk:#1a8a32;--vis-hv:#30d158;
  --pin:#ff3b30;--cap:#636366;
  --ui:rgba(255,255,255,0.86);--bdr:rgba(0,0,0,0.09);
  --txt:#1c1c1e;--txt2:#6e6e73;--blue:#007AFF;
}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;background:#1a2535;color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
#bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--ui);backdrop-filter:saturate(180%) blur(24px);border-bottom:.5px solid var(--bdr);gap:10px;flex-wrap:wrap;z-index:100}
#bl{display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0}
#br2{display:flex;gap:5px;flex-shrink:0}
#ttl{font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.02em;white-space:nowrap}
#stats{display:flex;gap:5px}
.st{background:rgba(0,122,255,.08);border-radius:8px;padding:3px 9px;text-align:center;border:.5px solid rgba(0,122,255,.12)}
.sn{font-size:14px;font-weight:700;color:var(--blue);line-height:1.25}
.sl{font-size:8px;color:var(--txt2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* Search */
#sw{position:relative;flex:1;min-width:160px;max-width:260px}
#cs{width:100%;padding:7px 11px 7px 30px;border:none;border-radius:10px;font-size:13px;font-family:inherit;background:rgba(118,118,128,.10);outline:none;color:var(--txt)}
#cs::placeholder{color:var(--txt2)}
#cs:focus{background:rgba(118,118,128,.18)}
#si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:12px;pointer-events:none}
#sugs{position:absolute;top:calc(100% + 5px);left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:saturate(180%) blur(24px);border-radius:13px;box-shadow:0 10px 40px rgba(0,0,0,.16),0 0 0 .5px var(--bdr);z-index:400;display:none;overflow:hidden;max-height:280px;overflow-y:auto}
.sg{padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--txt);border-bottom:.5px solid rgba(0,0,0,.05)}
.sg:last-child{border-bottom:none}
.sg:hover,.sg.act{background:rgba(0,122,255,.07)}
.sg-ic{font-size:14px;flex-shrink:0}
.sg-nm{font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sg-ct{font-size:11px;color:var(--txt2);white-space:nowrap;padding-left:6px}
.sg-add{color:var(--blue)}

.btn{font-size:12px;font-weight:500;font-family:inherit;color:var(--blue);background:rgba(0,122,255,.08);border:none;border-radius:9px;padding:5px 11px;cursor:pointer;white-space:nowrap}
.btn:hover{background:rgba(0,122,255,.15)}
.btn.d{color:var(--pin);background:rgba(255,59,48,.08)}
.btn.d:hover{background:rgba(255,59,48,.15)}

/* ── Globe ── */
#map{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 90% 90% at 50% 50%,#243550 0%,#0e1520 100%)}
#world{cursor:grab;user-select:none;touch-action:none;display:block;overflow:visible}
#world:active{cursor:grabbing}
.gratline{fill:none;stroke:rgba(255,255,255,.10);stroke-width:.5}
.country{fill:var(--land);stroke:var(--land-b);stroke-width:.35;cursor:pointer;transition:fill .12s;vector-effect:non-scaling-stroke}
.country:hover{fill:var(--land-h)}
.country.visited{fill:var(--vis);stroke:var(--vis-dk);vector-effect:non-scaling-stroke}
.country.visited:hover{fill:var(--vis-hv)}
.borders{fill:none;stroke:rgba(80,70,50,.14);stroke-width:.4;vector-effect:non-scaling-stroke}
.ter-ov{pointer-events:none;stroke:var(--land-b);stroke-width:.35;vector-effect:non-scaling-stroke;transition:fill .12s}
.ter-ov:hover{opacity:.85}
.micro{cursor:pointer}
.micro rect{fill:var(--land);stroke:var(--land-b);stroke-width:.8;vector-effect:non-scaling-stroke;transition:fill .12s}
.micro:hover rect{fill:var(--land-h)}
.micro.visited rect{fill:var(--vis);stroke:var(--vis-dk)}
.micro text{font-size:7px;font-weight:600;fill:var(--txt2);text-anchor:middle;dominant-baseline:central;pointer-events:none;paint-order:stroke;stroke:rgba(255,255,255,.8);stroke-width:2px;opacity:0;transition:opacity .15s}.micro:hover text,.micro.hovered text{opacity:1}
.micro.visited text{fill:#0d4a1e}
.cap-c{fill:var(--cap);stroke:rgba(255,255,255,.9);stroke-width:1.2;pointer-events:none;opacity:0;transition:opacity .15s;vector-effect:non-scaling-stroke}
.cap-c.on{opacity:1}
.cap-l{font-size:8px;font-weight:600;fill:#3a3a3c;text-anchor:middle;pointer-events:none;opacity:0;transition:opacity .15s;paint-order:stroke;stroke:rgba(255,255,255,.9);stroke-width:2.5px}
.cap-l.on{opacity:1}
.pin{cursor:pointer}
.pin text{font-size:8.5px;font-weight:700;font-family:-apple-system,sans-serif;fill:#1c1c1e;text-anchor:middle;paint-order:stroke;stroke:rgba(255,255,255,.95);stroke-width:3.5px;pointer-events:none}
#tip{position:absolute;pointer-events:none;background:rgba(28,28,30,.88);backdrop-filter:blur(14px);border-radius:9px;padding:5px 12px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap;display:none;box-shadow:0 4px 20px rgba(0,0,0,.35);z-index:80;transform:translateX(-50%)}
#zc{position:absolute;bottom:18px;right:16px;z-index:30;background:var(--ui);backdrop-filter:saturate(180%) blur(20px);border-radius:11px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.20),0 0 0 .5px var(--bdr);display:flex;flex-direction:column}
.zb{width:34px;height:34px;background:none;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt);font-weight:300;user-select:none}
.zb:hover{background:rgba(0,0,0,.06)}
.zd{height:.5px;background:var(--bdr)}
#leg{position:absolute;bottom:18px;left:16px;z-index:30;background:var(--ui);backdrop-filter:saturate(180%) blur(20px);border-radius:11px;padding:8px 12px;box-shadow:0 2px 12px rgba(0,0,0,.16),0 0 0 .5px var(--bdr);font-size:11px;color:var(--txt);font-weight:500;display:flex;flex-direction:column;gap:5px}
.lr{display:flex;align-items:center;gap:7px}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0}
#loading{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500}
.lsp{width:26px;height:26px;border:2.5px solid rgba(255,255,255,.18);border-top-color:rgba(255,255,255,.75);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Bottom chips */
#bot{flex-shrink:0;background:var(--ui);backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--bdr);padding:7px 16px 8px;max-height:84px;overflow-y:auto}
#blbl{font-size:9.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
#chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{display:inline-flex;align-items:center;gap:2px;border-radius:20px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.chip.cc{background:rgba(52,199,89,.11);color:#1a7a32}
.chip.cc:hover{background:rgba(52,199,89,.20)}
.chip.ct{background:rgba(255,159,10,.10);color:#8a5000}
.chip.ct:hover{background:rgba(255,159,10,.20)}
.chip.cp{background:rgba(255,59,48,.09);color:#b02a22}
.chip.cp:hover{background:rgba(255,59,48,.18)}
.cx{opacity:.4;font-size:11px}
.em{font-size:12px;color:var(--txt2);font-style:italic}

/* Modal */
#mover{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#mover.open{display:flex}
#mbox{background:rgba(255,255,255,.97);border-radius:16px;padding:20px 24px;min-width:280px;max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;gap:12px}
#mtitle{font-size:15px;font-weight:700;color:var(--txt)}
#minput,#minput2{padding:9px 12px;border:1.5px solid rgba(0,122,255,.3);border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:var(--txt);background:rgba(118,118,128,.07)}
#minput:focus{border-color:var(--blue);background:#fff}
#mact{display:flex;gap:8px;justify-content:flex-end}
.mbtn{font-size:13px;font-weight:600;font-family:inherit;padding:7px 16px;border-radius:9px;border:none;cursor:pointer}
.mbtn.mc{background:rgba(118,118,128,.12);color:var(--txt2)}
.mbtn.mk{background:var(--blue);color:#fff}
</style>
</head>
<body>

<!-- Topbar -->
<div id="bar">
  <div id="bl">
    <span id="ttl">🌍 I miei viaggi</span><span id="sync-badge" title="Stato sincronizzazione" style="font-size:11px;color:var(--txt2);font-weight:500;white-space:nowrap"></span>
    <div id="stats">
      <div class="st"><div class="sn"><span id="cc">0</span><span style="font-size:9px;color:var(--txt2);font-weight:400">/193</span></div><div class="sl">Paesi</div></div>
      <div class="st"><div class="sn" id="ct">0</div><div class="sl">Territori</div></div>
      <div class="st"><div class="sn" id="ci">0</div><div class="sl">Città</div></div>
      <div class="st"><div class="sn" id="pc">0%</div><div class="sl">Mondo</div></div>
    </div>
    <div id="sw">
      <span id="si">🔍</span>
      <input id="cs" type="text" placeholder="Cerca una città…" autocomplete="off" spellcheck="false">
      <div id="sugs"></div>
    </div>
  </div>
  <div id="br2">
    <button class="btn" id="be">↓ Esporta</button>
    <button class="btn" id="bi">↑ Importa</button>
    <input type="file" id="fi" accept=".json" style="display:none">
    <button class="btn" id="brf" title="Ricarica dal cloud">↻ Sync</button>
    <button class="btn d" id="brs">✕ Azzera</button>
  </div>
</div>

<!-- Globe -->
<div id="map">
  <div id="loading"><div class="lsp"></div>Caricamento…</div>
  <div id="tip"></div>
  <svg id="world">
    <defs>
      <radialGradient id="og" cx="33%" cy="28%" r="65%"><stop offset="0%" stop-color="#c8e4f0"/><stop offset="55%" stop-color="#8cbcd8"/><stop offset="100%" stop-color="#5a9ab8"/></radialGradient>
      <radialGradient id="ag" cx="38%" cy="34%" r="60%"><stop offset="0%" stop-color="#7ab8dc" stop-opacity=".5"/><stop offset="65%" stop-color="#3a7aaa" stop-opacity=".15"/><stop offset="100%" stop-color="#1a4870" stop-opacity="0"/></radialGradient>
      <radialGradient id="sh" cx="33%" cy="28%" r="70%"><stop offset="0%" stop-color="rgba(255,255,248,.18)"/><stop offset="60%" stop-color="rgba(255,255,240,.04)"/><stop offset="100%" stop-color="rgba(0,0,0,.10)"/></radialGradient>
      <clipPath id="gc"><circle id="gcc"/></clipPath>
    </defs>
    <circle id="atm" fill="url(#ag)"/>
    <g id="globe" clip-path="url(#gc)">
      <circle id="ocean" fill="url(#og)"/>
      <path id="grat" class="gratline"/>
      <g id="lands"/>
      <path id="bdrs" class="borders"/>
      <g id="ters"/>
      <g id="mics"/>
      <g id="caps"/>
      <g id="pins"/>
      <circle id="shine" fill="url(#sh)" style="pointer-events:none"/>
    </g>
  </svg>
  <div id="zc">
    <button class="zb" id="zi">+</button><div class="zd"></div>
    <button class="zb" id="zo">−</button><div class="zd"></div>
    <button class="zb" id="zr" style="font-size:13px">⌂</button>
  </div>
  <div id="leg">
    <div class="lr"><div class="ld" style="background:var(--vis);border:1px solid var(--vis-dk)"></div>Paese visitato</div>
    <div class="lr"><div class="ld" style="background:var(--pin);border-radius:50%;border:1px solid #900"></div>Città</div>
    <div class="lr" style="font-size:10px;color:var(--txt2);font-style:italic">Trascina · Scroll=zoom · Dbl.click=rinomina</div>
  </div>
</div>

<!-- Bottom chips -->
<div id="bot">
  <div id="blbl">Luoghi visitati</div>
  <div id="chips"><span class="em">Clicca su un paese o cerca una città per iniziare</span></div>
</div>

<!-- Modal (MUST be before script so getElementById works) -->
<div id="mover">
  <div id="mbox">
    <div id="mtitle">Rinomina</div>
    <input id="minput" type="text" placeholder="Nuovo nome…" spellcheck="false">
    <input id="minput2" type="text" placeholder="Lon,Lat — es: 12.49,41.90" spellcheck="false" style="display:none">
    <div id="mact">
      <button class="mbtn mc" id="mcancel">Annulla</button>
      <button class="mbtn mk" id="mok">Salva</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

const SK        = 'travel_v11';
const SUPA_URL  = 'https://znbvabgaabywsxyuleoe.supabase.co/rest/v1/travel_map';
const SUPA_KEY  = 'sb_publishable_kyQpbmE3wrkh1amBETmf8Q_i1jFePNF';
const SUPA_HDRS = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };
let   syncTimer = null;
let state = { countries:[], territories:[], cities:[], customNames:{} };

function lsSet(v) { try { localStorage.setItem(SK, v); } catch(e){} }
function lsGet()  { try { return localStorage.getItem(SK); } catch(e){ return null; } }

function save() {
  lsSet(JSON.stringify(state));
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 800);  // debounce 800ms
}

function setSyncBadge(text, color) {
  const el = document.getElementById('sync-badge');
  if (el) { el.textContent = text; el.style.color = color || 'var(--txt2)'; }
}

async function syncToCloud() {
  setSyncBadge('↑ salvataggio…', '#007AFF');
  try {
    const res = await fetch(SUPA_URL, {
      method: 'POST',
      headers: SUPA_HDRS,
      body: JSON.stringify({ id: 'default', state, updated_at: new Date().toISOString() })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncBadge('✓ sincronizzato', '#34c759');
    setTimeout(() => setSyncBadge(''), 2500);
  } catch(e) {
    setSyncBadge('⚠ offline', '#ff9f0a');
  }
}
function loadSt() {
  // Load localStorage immediately so map renders while cloud fetch is in flight
  try {
    const s = lsGet();
    if (s) {
      const p = JSON.parse(s);
      state = { countries:p.countries||[], territories:p.territories||[],
                 cities:p.cities||[], customNames:p.customNames||{} };
    }
  } catch(e) {}
}

async function loadFromCloud() {
  setSyncBadge('↓ caricamento…', '#007AFF');
  try {
    const res = await fetch(SUPA_URL + '?id=eq.default&select=state,updated_at', {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (rows.length > 0) {
      const cloudState = rows[0].state;
      // Use cloud state (it's the source of truth)
      state = {
        countries:   cloudState.countries   || [],
        territories: cloudState.territories || [],
        cities:      cloudState.cities      || [],
        customNames: cloudState.customNames || {}
      };
      // Update localStorage cache
      lsSet(JSON.stringify(state));
    } else {
      // No cloud data yet — push current local state
      syncToCloud();
    }
    setSyncBadge('✓ sincronizzato', '#34c759');
    const t = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    setSyncBadge('✓ sync ' + t, '#34c759');
    setTimeout(() => setSyncBadge('✓ '+t,'#8e8e93'), 2500);
    return true;
  } catch(e) {
    setSyncBadge('⚠ offline', '#ff9f0a');
    return false;
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function cname(id) { return state.customNames[String(id)] || NM[+id] || 'ID '+id; }
function inBbox(lon,lat,[w,s,e,n]) { return lon>=w&&lon<=e&&lat>=s&&lat<=n; }
function isVis(lon,lat) {
  const [rl,rp]=rot, la=lat*Math.PI/180, lo=(lon+rl)*Math.PI/180, ph=rp*Math.PI/180;
  return Math.cos(la)*Math.cos(lo)*Math.cos(-ph)+Math.sin(la)*Math.sin(-ph)>0.03;
}
function svgPt(ev) {
  const r=document.getElementById('map').getBoundingClientRect();
  return [ev.clientX-r.left, ev.clientY-r.top];
}

// ── Tooltip ────────────────────────────────────────────────────────────────
const tipEl=document.getElementById('tip');
const mapEl=document.getElementById('map');
function showTip(ev,html) {
  const r=mapEl.getBoundingClientRect();
  tipEl.style.display='block';
  tipEl.style.left=(ev.clientX-r.left)+'px';
  tipEl.style.top=(ev.clientY-r.top-46)+'px';
  tipEl.innerHTML=html;
}
function hideTip() { tipEl.style.display='none'; }

// ── Modal (elements exist in DOM above script tag) ────────────────────────
let mCb=null;
// openModal(title, val, ph, cb)            -- single field
// openModal(title, val, ph, cb, ph2, val2) -- two fields (name + coords)
function openModal(title, val, ph, cb, ph2, val2) {
  document.getElementById('mtitle').textContent=title;
  const inp=document.getElementById('minput');
  inp.value=val||''; inp.placeholder=ph||'';
  const inp2=document.getElementById('minput2');
  if(ph2!==undefined){
    inp2.placeholder=ph2||''; inp2.value=val2||'';
    inp2.style.display='block';
  } else {
    inp2.style.display='none'; inp2.value='';
  }
  document.getElementById('mover').classList.add('open');
  mCb=cb;
  setTimeout(()=>{inp.focus();inp.select();},50);
}
function closeModal() { document.getElementById('mover').classList.remove('open'); mCb=null; }

document.getElementById('mcancel').addEventListener('click', closeModal);
document.getElementById('mok').addEventListener('click', ()=>{
  const v=document.getElementById('minput').value.trim();
  const v2=document.getElementById('minput2').value.trim();
  if(v && mCb) mCb(v, v2);
  closeModal();
});
document.getElementById('minput').addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const inp2=document.getElementById('minput2');
    if(inp2.style.display!=='none') inp2.focus();
    else document.getElementById('mok').click();
  }
  if(e.key==='Escape') closeModal();
});
document.getElementById('minput2').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('mok').click();
  if(e.key==='Escape') closeModal();
});
document.getElementById('mover').addEventListener('click', e=>{
  if(e.target===document.getElementById('mover')) closeModal();
});

// ── Init globe ─────────────────────────────────────────────────────────────
function init() {
  loadSt();
  const svgEl=document.getElementById('world');
  const rect=document.getElementById('map').getBoundingClientRect();
  W=rect.width||800; H=rect.height||500; cx=W/2; cy=H/2;
  svgEl.setAttribute('width',W); svgEl.setAttribute('height',H);
  svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
  scale0=Math.min(W,H)*0.43; scaleNow=scale0;
  proj=d3.geoOrthographic().scale(scaleNow).translate([cx,cy]).clipAngle(90).rotate(rot).precision(0.3);
  pathFn=d3.geoPath().projection(proj);
  posCircles();
  d3.select('#grat').attr('d',pathFn(d3.geoGraticule()()));
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json')
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(world=>{
      worldTopo=world;
      buildLands(world);
      buildTerOverlays();
      buildMicros();
      buildCapDots();
      setupEvents();
      applyState();
      // Always fetch from cloud (primary source, works in Notion iframes)
      loadFromCloud().then(ok => {
        if(ok) applyState();
        document.getElementById('loading').style.display='none';
      });
    })
    .catch(err=>{
      document.getElementById('loading').innerHTML=
        `<div style="text-align:center;color:rgba(255,255,255,.7);padding:24px">
          <div style="font-size:32px;margin-bottom:8px">⚠️</div>
          <div style="font-weight:600">Impossibile caricare la mappa</div>
          <div style="font-size:11px;opacity:.6;margin-top:4px">${err.message}</div>
          <button onclick="location.reload()" style="margin-top:14px;padding:8px 20px;border:none;border-radius:9px;background:rgba(255,255,255,.14);color:#fff;cursor:pointer;font-size:13px;font-family:inherit">Riprova</button>
        </div>`;
    });
}

function posCircles() {
  const r=scaleNow;
  d3.select('#gcc').attr('cx',cx).attr('cy',cy).attr('r',r);
  d3.select('#ocean').attr('cx',cx).attr('cy',cy).attr('r',r);
  d3.select('#shine').attr('cx',cx).attr('cy',cy).attr('r',r);
  d3.select('#atm').attr('cx',cx).attr('cy',cy).attr('r',r*1.06);
}

// ── Build layers ───────────────────────────────────────────────────────────
function buildLands(world) {
  // Split parent country features so territories are separate paths
  const rawFeatures = topojson.feature(world, world.objects.countries).features;
  const borders     = topojson.mesh(world, world.objects.countries, (a,b) => a!==b);

  // Build a map: parentId → [territory, ...]
  const tersByParent = {};
  TERS.forEach(ter => {
    (tersByParent[ter.p] = tersByParent[ter.p] || []).push(ter);
  });

  // Split features: for countries that have territories, separate the polygons
  const countryFeatures = [];   // modified parent features (minus territory polygons)
  const terFeatures     = [];   // territory features (extracted polygons)

  rawFeatures.forEach(feat => {
    const parentId = +feat.id;
    const myTers   = tersByParent[parentId];

    if (!myTers || !myTers.length) {
      countryFeatures.push(feat);
      return;
    }

    // This country has territories — split its geometry
    const geom = feat.geometry;
    // Normalize to array of polygon-coord-arrays
    const polys = geom.type === 'MultiPolygon'
      ? geom.coordinates            // [ [[ring], ...], ... ]
      : [geom.coordinates];         // Polygon → wrap

    // For each polygon, check if its centroid is inside a territory bbox
    const parentPolys = [];
    // One bucket per territory
    const terPolys = {};
    myTers.forEach(t => { terPolys[t.id] = []; });

    polys.forEach(polyCoords => {
      // Compute rough centroid of the outer ring
      const ring = polyCoords[0];
      const cx   = ring.reduce((s,p) => s + p[0], 0) / ring.length;
      const cy   = ring.reduce((s,p) => s + p[1], 0) / ring.length;

      const matchedTer = myTers.find(t => inBboxSimple(cx, cy, t.bbox));
      if (matchedTer) {
        terPolys[matchedTer.id].push(polyCoords);
      } else {
        parentPolys.push(polyCoords);
      }
    });

    // Rebuild parent feature (only non-territory polygons)
    if (parentPolys.length > 0) {
      countryFeatures.push({
        ...feat,
        geometry: {
          type: parentPolys.length === 1 ? 'Polygon' : 'MultiPolygon',
          coordinates: parentPolys.length === 1 ? parentPolys[0] : parentPolys
        }
      });
    }

    // Create a feature per territory (only if it has polygons)
    myTers.forEach(ter => {
      const tPolys = terPolys[ter.id];
      if (tPolys.length === 0) return;
      terFeatures.push({
        type: 'Feature',
        id: `ter_${ter.id}`,
        properties: { terId: ter.id, parentId },
        geometry: {
          type: tPolys.length === 1 ? 'Polygon' : 'MultiPolygon',
          coordinates: tPolys.length === 1 ? tPolys[0] : tPolys
        }
      });
    });
  });

  // Render country paths
  d3.select('#lands').selectAll('path.country')
    .data(countryFeatures).join('path')
    .attr('class','country').attr('d',pathFn)
    .attr('data-id', d => +d.id)
    .on('mousemove',(ev,d) => {
      const name = cname(+d.id);
      const vis  = state.countries.includes(String(+d.id));
      showTip(ev, (vis?'✓ ':'')+name);
      showCap(+d.id);
    })
    .on('mouseleave',(ev,d) => { hideTip(); hideCap(+d.id); })
    .on('click',(ev,d) => { if(!wasDrag) toggleCountry(String(+d.id)); });

  // Render territory paths (separate, independent)
  d3.select('#ters').selectAll('path.ter-path')
    .data(terFeatures).join('path')
    .attr('class','ter-path')
    .attr('d', pathFn)
    .attr('data-ter', d => d.properties.terId)
    .attr('fill', d => state.territories.includes(d.properties.terId) ? 'var(--vis)' : 'var(--land)')
    .attr('stroke', 'var(--land-b)')
    .attr('stroke-width', '0.35')
    .style('vector-effect','non-scaling-stroke')
    .style('cursor','pointer')
    .on('mousemove',(ev,d) => {
      const ter = TERS.find(t => t.id === d.properties.terId);
      const vis = state.territories.includes(d.properties.terId);
      showTip(ev, (vis?'✓ ':'')+(state.customNames[d.properties.terId]||ter?.name||d.properties.terId));
    })
    .on('mouseleave', hideTip)
    .on('click',(ev,d) => { ev.stopPropagation(); if(!wasDrag) toggleTer(d.properties.terId); });

  d3.select('#bdrs').attr('d', pathFn(borders));
}

function inBboxSimple(lon, lat, [w,s,e,n]) { return lon>=w && lon<=e && lat>=s && lat<=n; }

function buildTerOverlays() { /* no visual overlay - detection via inBbox */ }
function updateTerOverlays() {
  d3.select('#ters').selectAll('path.ter-path')
    .attr('fill', d => state.territories.includes(d.properties.terId) ? 'var(--vis)' : 'var(--land)');
}

function buildMicros() {
  const g=d3.select('#mics');
  MICROS.forEach(ms=>{
    const pt=proj([ms.lon,ms.lat]);
    const mg=g.append('g').attr('class','micro').attr('id','MC'+ms.id)
      .attr('transform',pt?`translate(${pt[0]},${pt[1]})`:'translate(-999,-999)');
    mg.append('rect').attr('x',-5).attr('y',-5).attr('width',10).attr('height',10).attr('rx',2);
    mg.append('text').attr('class','micro-lbl').attr('y',14).attr('font-size',7)
      .text(ms.name.length>10?ms.name.slice(0,9)+'…':ms.name);
    mg.on('click',e=>{e.stopPropagation();if(!wasDrag)toggleCountry(String(ms.id));})
      .on('mousemove',e=>{const v=state.countries.includes(String(ms.id));showTip(e,(v?'✓ ':'')+cname(ms.id));showCap(ms.id);d3.select('#MC'+ms.id).classed('hovered',true);})
      .on('mouseleave',()=>{hideTip();hideCap(ms.id);d3.select('#MC'+ms.id).classed('hovered',false);});
  });
}

function buildCapDots() {
  const g=d3.select('#caps');
  Object.entries(CAPS).forEach(([id,[lon,lat,name]])=>{
    const pt=proj([lon,lat]);
    const cg=g.append('g').attr('id','CAP'+id);
    cg.append('circle').attr('class','cap-c').attr('cx',pt?pt[0]:-999).attr('cy',pt?pt[1]:-999).attr('r',3);
    cg.append('text').attr('class','cap-l').attr('x',pt?pt[0]:-999).attr('y',pt?pt[1]-6:-999).text(name);
  });
}

function showCap(id) {
  if(hovId===id) return; hovId=id;
  d3.select('#CAP'+id).selectAll('.cap-c,.cap-l').classed('on',true);
}
function hideCap(id) {
  if(hovId!==id) return; hovId=null;
  d3.select('#CAP'+id).selectAll('.cap-c,.cap-l').classed('on',false);
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  proj.rotate(rot).scale(scaleNow).translate([cx,cy]);
  pathFn=d3.geoPath().projection(proj);
  posCircles();
  d3.select('#grat').attr('d',pathFn(d3.geoGraticule()()));
  d3.select('#lands').selectAll('path.country').attr('d',pathFn);
  d3.select('#ters').selectAll('path.ter-path').attr('d',pathFn);
  if(worldTopo) d3.select('#bdrs').attr('d',pathFn(topojson.mesh(worldTopo,worldTopo.objects.countries,(a,b)=>a!==b)));
  const k=scaleNow/scale0;
  const capR=Math.max(1.5,3/Math.sqrt(k)), capFs=Math.max(5.5,8/Math.sqrt(k));
  Object.entries(CAPS).forEach(([id,[lon,lat]])=>{
    const v=isVis(lon,lat); d3.select('#CAP'+id).style('display',v?null:'none');
    if(v){const pt=proj([lon,lat]);if(pt){d3.select('#CAP'+id+' .cap-c').attr('cx',pt[0]).attr('cy',pt[1]).attr('r',capR);d3.select('#CAP'+id+' .cap-l').attr('x',pt[0]).attr('y',pt[1]-capR-2).attr('font-size',capFs);}}
  });

  MICROS.forEach(ms=>{
    const v=isVis(ms.lon,ms.lat); d3.select('#MC'+ms.id).style('display',v?null:'none');
    if(v){const pt=proj([ms.lon,ms.lat]);if(pt) d3.select('#MC'+ms.id).attr('transform',`translate(${pt[0]},${pt[1]})`);};
  });

  const w=PIN_W/Math.sqrt(k), h=PIN_H/Math.sqrt(k), fs=8.5/Math.sqrt(k);
  state.cities.forEach(city=>{
    const v=isVis(city.lon,city.lat); const pg=d3.select('#PN'+city.id);
    if(pg.empty()) return;
    pg.style('display',v?null:'none');
    if(v){const pt=proj([city.lon,city.lat]);if(pt){pg.attr('transform',`translate(${pt[0]},${pt[1]})`);pg.select('image').attr('width',w).attr('height',h).attr('x',-w/2).attr('y',-h);pg.select('text').attr('y',-h-3).attr('font-size',fs);}}
  });
  hovId=null;
  d3.selectAll('.cap-c,.cap-l').classed('on',false);
}

// ── Interaction ────────────────────────────────────────────────────────────
function setupEvents() {
  const svgEl=document.getElementById('world');
  svgEl.addEventListener('mousedown',e=>{
    if(e.target.closest('.micro,.pin')) return;
    dragging=true;wasDrag=false;dragP=[e.clientX,e.clientY];rotP=[...rot];
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const dx=e.clientX-dragP[0],dy=e.clientY-dragP[1];
    if(Math.abs(dx)+Math.abs(dy)>3) wasDrag=true;
    const s=180/(scaleNow*Math.PI);
    rot=[rotP[0]+dx*s,Math.max(-90,Math.min(90,rotP[1]-dy*s))];
    render();
  });
  window.addEventListener('mouseup',()=>{dragging=false;});
  svgEl.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    dragging=true;wasDrag=false;
    dragP=[e.touches[0].clientX,e.touches[0].clientY];rotP=[...rot];
  },{passive:true});
  svgEl.addEventListener('touchmove',e=>{
    if(!dragging||e.touches.length!==1) return;
    e.preventDefault();
    const dx=e.touches[0].clientX-dragP[0],dy=e.touches[0].clientY-dragP[1];
    if(Math.abs(dx)+Math.abs(dy)>3) wasDrag=true;
    const s=180/(scaleNow*Math.PI);
    rot=[rotP[0]+dx*s,Math.max(-90,Math.min(90,rotP[1]-dy*s))];
    render();
  },{passive:false});
  svgEl.addEventListener('touchend',()=>{dragging=false;});
  svgEl.addEventListener('wheel',e=>{
    e.preventDefault();
    scaleNow=Math.max(scale0*.85,Math.min(scale0*9,scaleNow*(e.deltaY<0?1.10:0.91)));
    render();
  },{passive:false});
}

// ── State ops ──────────────────────────────────────────────────────────────
function toggleCountry(id) { state.countries.includes(id)?rmCountry(id):addCountry(id); }
function addCountry(id) {
  if(!state.countries.includes(id)) state.countries.push(id);
  d3.selectAll(`.country[data-id="${id}"]`).classed('visited',true);
  d3.select('#MC'+id).classed('visited',true);
  save(); updUI(); updateTerOverlays();
}
function rmCountry(id) {
  state.countries=state.countries.filter(x=>x!==id);
  d3.selectAll(`.country[data-id="${id}"]`).classed('visited',false);
  d3.select('#MC'+id).classed('visited',false);
  save(); updUI(); updateTerOverlays();
}
function toggleTer(id) { state.territories.includes(id)?rmTer(id):addTer(id); }
function addTer(id) {
  if(!state.territories.includes(id)) state.territories.push(id);
  save(); updUI(); updateTerOverlays();
}
function rmTer(id) {
  state.territories=state.territories.filter(x=>x!==id);
  save(); updUI(); updateTerOverlays();
}
function addCity(city) {
  if(state.cities.find(c=>c.id===city.id)) return;
  state.cities.push(city);
  drawPin(city);
  save(); updUI();
}
function rmCity(id) {
  state.cities=state.cities.filter(c=>c.id!==id);
  d3.select('#PN'+id).remove();
  save(); updUI();
}

// ── Pins ───────────────────────────────────────────────────────────────────
function drawPin(city) {
  if(!proj) return;
  const pt=proj([city.lon,city.lat]);
  if(!pt) return;
  const k=scaleNow/scale0, w=PIN_W/Math.sqrt(k), h=PIN_H/Math.sqrt(k), fs=8.5/Math.sqrt(k);
  const nm=state.customNames[city.id]||city.name;
  const g=d3.select('#pins').append('g').attr('class','pin').attr('id','PN'+city.id)
    .attr('transform',`translate(${pt[0]},${pt[1]})`);
  g.append('image').attr('href',PIN_IMG).attr('width',w).attr('height',h).attr('x',-w/2).attr('y',-h).attr('image-rendering','auto');
  g.append('text').attr('y',-h-3).attr('font-size',fs).text(nm);
  g.on('click',e=>{e.stopPropagation();if(!wasDrag)rmCity(city.id);})
   .on('dblclick',e=>{e.stopPropagation();openModal('Rinomina città',state.customNames[city.id]||city.name,'Nome…',n=>{state.customNames[city.id]=n;city.name=n;d3.select('#PN'+city.id+' text').text(n);save();updUI();});})
   .on('mousemove',e=>showTip(e,'📍 '+(state.customNames[city.id]||city.name)+' · click=rimuovi · dblclick=rinomina'))
   .on('mouseleave',hideTip);
}
function redrawPins() { d3.select('#pins').selectAll('*').remove(); state.cities.forEach(drawPin); }

function applyState() {
  state.countries.forEach(id=>{
    d3.selectAll(`.country[data-id="${id}"]`).classed('visited',true);
    d3.select('#MC'+id).classed('visited',true);
  });
  redrawPins();
  updateTerOverlays();
  updUI();
  // Also apply territory visited state to ter-path elements
  d3.select('#ters').selectAll('path.ter-path')
    .attr('fill', d => state.territories.includes(d.properties.terId) ? 'var(--vis)' : 'var(--land)');
}

// ── Stats + Chips ──────────────────────────────────────────────────────────
function updUI() {
  const unV=state.countries.filter(id=>UN.has(+id)).length;
  document.getElementById('cc').textContent=state.countries.length;
  document.getElementById('ct').textContent=state.territories.length;
  document.getElementById('ci').textContent=state.cities.length;
  document.getElementById('pc').textContent=Math.round(unV/193*100)+'%';

  const el=document.getElementById('chips');
  if(!state.countries.length&&!state.territories.length&&!state.cities.length){
    el.innerHTML='<span class="em">Clicca su un paese o cerca una città per iniziare</span>';return;
  }
  const cc=state.countries.map(id=>{
    const nm=cname(id);
    return `<span class="chip cc" data-t="c" data-id="${id}" title="Dbl.click=rinomina">${nm}<span class="cx" data-del="1"> ×</span></span>`;
  }).sort();
  const tt=state.territories.map(id=>{
    const t=TERS.find(x=>x.id===id);
    const nm=state.customNames[id]||(t?t.name:id);
    return `<span class="chip ct" data-t="r" data-id="${id}" title="Dbl.click=rinomina">${nm}<span class="cx" data-del="1"> ×</span></span>`;
  }).sort();
  const ci=state.cities.map(c=>{
    const nm=state.customNames[c.id]||c.name;
    return `<span class="chip cp" data-t="p" data-id="${c.id}" title="Dbl.click=rinomina">📍 ${nm}<span class="cx" data-del="1"> ×</span></span>`;
  }).sort();
  el.innerHTML=[...cc,...tt,...ci].join('');

  el.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',e=>{
      if(e.target.dataset.del) {
        const t=chip.dataset.t, id=chip.dataset.id;
        if(t==='c') rmCountry(id); else if(t==='r') rmTer(id); else rmCity(id);
      }
    });
    chip.addEventListener('dblclick',e=>{
      e.stopPropagation();
      const t=chip.dataset.t, id=chip.dataset.id;
      const cur = t==='c'?cname(id): t==='r'?(state.customNames[id]||TERS.find(x=>x.id===id)?.name||id): (state.customNames[id]||state.cities.find(c=>c.id===id)?.name||id);
      openModal('Rinomina',cur,'Nuovo nome…',n=>{
        state.customNames[id]=n;
        if(t==='p'){ const city=state.cities.find(c=>c.id===id); if(city) city.name=n; redrawPins(); }
        save(); updUI();
      });
    });
  });
}

// ── Fly to ─────────────────────────────────────────────────────────────────
function flyTo(lon,lat) {
  const t0=[...rot],t1=[-lon,-lat],ts=performance.now(),dur=750;
  (function step(now) {
    const p=Math.min(1,(now-ts)/dur),e=p<.5?2*p*p:-1+(4-2*p)*p;
    rot=[t0[0]+(t1[0]-t0[0])*e,t0[1]+(t1[1]-t0[1])*e];
    render(); if(p<1) requestAnimationFrame(step);
  })(ts);
}

// ── Search ─────────────────────────────────────────────────────────────────
const csEl=document.getElementById('cs');
const sgEl=document.getElementById('sugs');
let stmr=null, sRes=[], kbdI=-1;

csEl.addEventListener('input',()=>{
  clearTimeout(stmr); kbdI=-1;
  const q=csEl.value.trim();
  if(q.length<2){sgEl.style.display='none';return;}
  sgEl.innerHTML='<div class="sg" style="color:var(--txt2);font-style:italic">Ricerca…</div>';
  sgEl.style.display='block';
  stmr=setTimeout(()=>doSearch(q),350);
});
csEl.addEventListener('keydown',e=>{
  const items=sgEl.querySelectorAll('.sg[data-i]');
  if(e.key==='ArrowDown'){e.preventDefault();kbdI=Math.min(kbdI+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('act',i===kbdI));}
  else if(e.key==='ArrowUp'){e.preventDefault();kbdI=Math.max(kbdI-1,0);items.forEach((el,i)=>el.classList.toggle('act',i===kbdI));}
  else if(e.key==='Enter'){e.preventDefault();const r=sRes[kbdI>=0?kbdI:0];if(r)pick(r);}
  else if(e.key==='Escape'){sgEl.style.display='none';}
});

async function doSearch(q) {
  const locTers=TERS.filter(t=>t.name.toLowerCase().includes(q.toLowerCase()));
  try {
    const url='https://nominatim.openstreetmap.org/search?format=json&limit=10&addressdetails=1&accept-language=it&q='+encodeURIComponent(q);
    const resp=await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const raw=await resp.json();
    const EXCL=new Set(['highway','amenity','shop','building','office','leisure','landuse','natural','waterway','railway']);
    const data=raw.filter(r=>!EXCL.has(r.class)&&(r.class==='place'||r.class==='boundary'||(r.type&&['city','town','village','hamlet','municipality','suburb','borough','administrative','locality'].includes(r.type)))).slice(0,7);
    sRes=data;

    const ltH=locTers.map(t=>`<div class="sg" data-lid="${t.id}"><span class="sg-ic">🏝</span><span class="sg-nm">${t.name}</span><span class="sg-ct">Territorio</span></div>`).join('');

    let rH='';
    if(data.length) {
      rH=data.map((r,i)=>{
        const parts=r.display_name.split(',');
        const name=parts[0].trim();
        const country=r.address?.country||parts[parts.length-1].trim();
        return `<div class="sg" data-i="${i}"><span class="sg-ic">📍</span><span class="sg-nm">${name}</span><span class="sg-ct">${name!==country?country:''}</span></div>`;
      }).join('');
    } else {
      rH=`<div class="sg sg-add" data-custom="1"><span class="sg-ic">➕</span><span class="sg-nm">Aggiungi "<strong>${q}</strong>" manualmente</span></div>`;
    }

    // Always add manual option at bottom
    const addH=data.length?`<div class="sg" data-custom="1" style="font-size:12px;color:var(--txt2)"><span class="sg-ic">➕</span><span class="sg-nm">Non trovi la città? Aggiungila manualmente</span></div>`:'';

    sgEl.innerHTML=ltH+rH+addH;
    sgEl.style.display='block';

    sgEl.querySelectorAll('.sg[data-lid]').forEach(el=>el.addEventListener('click',()=>{
      const ter=TERS.find(t=>t.id===el.dataset.lid);
      if(ter){addTer(ter.id);flyTo(ter.lon,ter.lat);}
      csEl.value='';sgEl.style.display='none';
    }));
    sgEl.querySelectorAll('.sg[data-i]').forEach(el=>el.addEventListener('click',()=>pick(data[+el.dataset.i])));
    sgEl.querySelectorAll('.sg[data-custom]').forEach(el=>el.addEventListener('click',()=>{
      const q2=csEl.value.trim();
      csEl.value='';sgEl.style.display='none';
      openModal('Aggiungi città',q2,'Nome — es: Tokyo',(name,coords)=>{
        let lon=0,lat=0;
        if(coords){const p=coords.split(',');lon=parseFloat(p[0].trim())||0;lat=parseFloat(p[1]?.trim())||0;}
        addCity({id:'custom_'+Date.now(),name,lat,lon});
        if(lon!==0||lat!==0) flyTo(lon,lat);
      },'Coordinate — es: 12.49,41.90','');
    }));
  } catch(err) {
    sgEl.innerHTML=`<div class="sg" style="color:var(--pin);font-size:12px">Errore di rete. Riprova.</div>`;
  }
}

function pick(r) {
  const name=r.display_name.split(',')[0].trim();
  addCity({id:'c'+r.place_id,name,lat:+r.lat,lon:+r.lon});
  csEl.value='';sgEl.style.display='none';
  flyTo(+r.lon,+r.lat);
}
document.addEventListener('click',e=>{if(!document.getElementById('sw').contains(e.target))sgEl.style.display='none';});

// ── Zoom buttons ───────────────────────────────────────────────────────────
document.getElementById('zi').addEventListener('click',()=>{scaleNow=Math.min(scale0*9,scaleNow*1.45);render();});
document.getElementById('zo').addEventListener('click',()=>{scaleNow=Math.max(scale0*.85,scaleNow/1.45);render();});
document.getElementById('zr').addEventListener('click',()=>{scaleNow=scale0;rot=[10,-20];render();});

// ── Export / Import / Reset ────────────────────────────────────────────────
document.getElementById('brf').addEventListener('click', async ()=>{
  setSyncBadge('↓ caricamento…','#007AFF');
  const ok = await loadFromCloud();
  if(ok) applyState();
});

document.getElementById('be').addEventListener('click',()=>{
  const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:'miei_viaggi.json'}).click();
});
document.getElementById('bi').addEventListener('click',()=>document.getElementById('fi').click());
document.getElementById('fi').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      state={countries:p.countries||[],territories:p.territories||[],cities:p.cities||[],customNames:p.customNames||{}};
      save();
      d3.selectAll('.country').classed('visited',false);
      d3.selectAll('.micro').classed('visited',false);
      applyState();
    }catch(e){alert('File non valido');}
  };
  rd.readAsText(f);e.target.value='';
});
document.getElementById('brs').addEventListener('click',()=>{
  if(!confirm('Azzerare tutto?'))return;
  state={countries:[],territories:[],cities:[],customNames:{}};save();
  d3.selectAll('.country').classed('visited',false);
  d3.selectAll('.micro').classed('visited',false);
  d3.select('#pins').selectAll('*').remove();
  updateTerOverlays();updUI();
});

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  const r=document.getElementById('map').getBoundingClientRect();
  W=r.width;H=r.height;cx=W/2;cy=H/2;
  const sv=document.getElementById('world');
  sv.setAttribute('width',W);sv.setAttribute('height',H);sv.setAttribute('viewBox',`0 0 ${W} ${H}`);
  scale0=Math.min(W,H)*0.43;scaleNow=Math.max(scaleNow,scale0*.85);
  if(proj){render();redrawPins();}
});

// ── Boot ───────────────────────────────────────────────────────────────────
requestAnimationFrame(()=>requestAnimationFrame(init));
</script>
